name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check api/ collector/ plc_simulator/ tests/
      - run: uv run ruff format --check api/ collector/ plc_simulator/ tests/

  # ── AWS Sensor API — 15 pytest (API + repo + S3 archival with moto) ─────────
  aws-sensor-api-test:
    name: AWS Sensor API — 15 pytest (API · repository · moto S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install deps
        run: uv sync --frozen
        working-directory: aws_sensor_api
      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short
        working-directory: aws_sensor_api

  # ── Python tests (no C++ daemon, no Modbus broker) ────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v --tb=short

  # ── C++ build + 13 GoogleTests ────────────────────────────────────────────
  cpp-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libmodbus
        run: sudo apt-get install -y libmodbus-dev

      - name: Configure CMake
        run: cmake -B controller/build -S controller -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build controller/build -j4

      - name: Run GoogleTests (13 tests)
        run: ctest --test-dir controller/build --output-on-failure -V

  # ── Renewables Portfolio Dispatch — 25 pytest-asyncio ─────────────────────
  renewables-dispatch-test:
    name: Renewables dispatch — ruff · mypy · 25 pytest-asyncio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: renewables_portfolio_dispatch

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: dispatch
          POSTGRES_USER: dispatch
          POSTGRES_PASSWORD: dispatch
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff lint + format check
        run: |
          uv run ruff check app/ tests/
          uv run ruff format --check app/ tests/

      - name: mypy strict
        run: uv run mypy app/ --ignore-missing-imports

      - name: Run 25 pytest-asyncio tests
        env:
          DATABASE_URL: postgresql+asyncpg://dispatch:dispatch@localhost:5432/dispatch
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          USE_TIMESCALEDB: "1"
        run: uv run pytest tests/ -v --tb=short

  # ── ARM64 cross-compile ────────────────────────────────────────────────────
  arm64-cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cross-compile dosing_core (no libmodbus, tests off)
        run: |
          cmake -B controller/build-arm64 -S controller \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DBUILD_TESTING=OFF
          cmake --build controller/build-arm64 --target dosing_core -j4
