services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: grid
      POSTGRES_DB: griddb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "grid", "-d", "griddb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://grid:grid@postgres:5432/griddb
      SMA_WINDOW_SIZE: "12"
      LOG_LEVEL: INFO
    ports:
      - "8099:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.workers.standalone
    environment:
      DATABASE_URL: postgresql+asyncpg://grid:grid@postgres:5432/griddb
      SMA_WINDOW_SIZE: "12"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

volumes:
  pgdata:
