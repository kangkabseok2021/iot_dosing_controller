services:

  # ── C++17 Dosing Controller daemon ────────────────────────────────────────
  dosing-controller:
    build:
      context: controller
      dockerfile: Dockerfile
    environment:
      MODBUS_PORT: 5502
    ports: ["5502:5502"]
    healthcheck:
      test: ["CMD-SHELL", "echo '' | nc -w1 localhost 5502 && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Modbus → SQLite collector ─────────────────────────────────────────────
  collector:
    build: .
    command: ["uv", "run", "python", "-m", "collector.main"]
    environment:
      MODBUS_HOST: dosing-controller
      MODBUS_PORT: 5502
      DB_PATH: /data/dosing.db
    volumes: ["dosing_data:/data"]
    depends_on:
      dosing-controller:
        condition: service_healthy

  # ── FastAPI dashboard ─────────────────────────────────────────────────────
  api:
    build: .
    command: ["uv", "run", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8092"]
    environment:
      DB_PATH: /data/dosing.db
    volumes: ["dosing_data:/data"]
    ports: ["8092:8092"]
    depends_on: [collector]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8092/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python PLC simulator ───────────────────────────────────────────────────
  plc-simulator:
    build: .
    command: ["uv", "run", "python", "-m", "plc_simulator.simulator"]
    environment:
      MODBUS_HOST: dosing-controller
      MODBUS_PORT: 5502
    depends_on:
      dosing-controller:
        condition: service_healthy

volumes:
  dosing_data:
